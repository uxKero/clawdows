name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # NativeAOT: the windows-latest runner already ships the MSVC toolchain
      # and vswhere on PATH, so no extra setup is needed.
      - name: Publish (NativeAOT)
        run: dotnet publish src/ClaudeStatusBar.csproj -c Release -o dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-status-bar
          path: dist/claude-status-bar.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/claude-status-bar.exe
